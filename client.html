<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Client Portal | E2E STR</title>
  <meta name="robots" content="noindex,nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garant:wght@300;400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
</head>
<body data-page="client">

  <header class="site-nav app-nav">
    <a class="brand" href="index.html">
      <svg class="brand-mark" width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="34" height="34" rx="7" fill="#111"/><path d="M6 19L17 8L28 19" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><path d="M10.5 17.5V27H15V21.5H19V27H23.5V17.5" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/><circle cx="17" cy="13" r="1.2" fill="white"/></svg>
      E2E STR
    </a>
    <nav>
      <a href="index.html">Home</a>
      <a href="team.html">Team Portal</a>
      <button id="lockPortal" class="small-button" type="button">Lock</button>
    </nav>
    <a class="nav-cta" href="plans.html">Get Started</a>
  </header>

  <main class="app-shell client-shell">

    <!-- Login -->
    <section id="login" class="login-card">
      <p class="eyebrow">Client Portal</p>
      <h1>Your Project Status</h1>
      <p>Enter your access code to view your project dashboard.</p>
      <p style="color:var(--muted);font-size:13px;">Demo password: <strong>client</strong></p>
      <form id="loginForm">
        <input id="password" type="password" placeholder="Enter access code" />
        <button class="button primary" type="submit">Open</button>
      </form>
    </section>

    <!-- App -->
    <section id="app" class="hidden">
      <div class="cp-shell">

        <!-- Project header -->
        <div style="margin-bottom:8px;">
          <p class="eyebrow">Client Dashboard</p>
          <h1 id="projectName" style="margin-bottom:8px;"></h1>
          <p id="projectSubtitle" style="color:var(--muted);font-size:14px;margin:0;"></p>
        </div>

        <!-- Stage stepper -->
        <div id="clientStageStepper"></div>

        <!-- Primary card: action needed OR all clear -->
        <div id="clientPrimaryCard"></div>

        <!-- Stage summary cards -->
        <div id="clientStageSummary" class="cp-stage-grid"></div>

        <!-- Detail tabs -->
        <div class="cp-detail-tabs">
          <nav class="cp-tab-nav">
            <button class="cp-tab-btn active" data-cp-tab="timeline">Timeline</button>
            <button class="cp-tab-btn" data-cp-tab="budget">Budget</button>
            <button class="cp-tab-btn" data-cp-tab="details">Project Details</button>
          </nav>
          <div id="cp-panel-timeline" class="cp-tab-panel active">
            <div id="clientStageAccordions"></div>
          </div>
          <div id="cp-panel-budget" class="cp-tab-panel">
            <div id="clientBudgetContent"></div>
          </div>
          <div id="cp-panel-details" class="cp-tab-panel">
            <div id="clientDetailsContent"></div>
          </div>
        </div>

      </div>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
